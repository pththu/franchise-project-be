# =============================
# SERVER CONFIG
# =============================
server.port=3000

# =============================
# SPRING APPLICATION
# =============================
spring.application.name=api-gateway

# =============================
# GLOBAL CORS CONFIG
# =============================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# =============================
# ROUTES CONFIGURATION
# =============================

# 1. Product Service
#spring.cloud.gateway.routes[0].id=product-service
#spring.cloud.gateway.routes[0].uri=http://localhost:3001
#spring.cloud.gateway.routes[0].predicates[0]=Path=/api/products/**

# 2. Inventory Service
spring.cloud.gateway.routes[1].id=inventory-service
spring.cloud.gateway.routes[1].uri=http://localhost:3002
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/inventory/**

# 3. Customer Service
spring.cloud.gateway.routes[2].id=customer-service
spring.cloud.gateway.routes[2].uri=http://localhost:3003
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/customers/**

# 4. Identity Service
spring.cloud.gateway.routes[3].id=identity-service
spring.cloud.gateway.routes[3].uri=http://localhost:3004
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/auth/**

# 5. Loyalty Service
spring.cloud.gateway.routes[4].id=loyalty-service
spring.cloud.gateway.routes[4].uri=http://localhost:3005
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/loyalty/**

# 6. Reporting Service
spring.cloud.gateway.routes[5].id=reporting-service
spring.cloud.gateway.routes[5].uri=http://localhost:3006
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/reports/**

# 7. Order Service
spring.cloud.gateway.routes[6].id=order-service
spring.cloud.gateway.routes[6].uri=http://localhost:3007
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/orders/**

# 8. Promotion Service
spring.cloud.gateway.routes[7].id=promotion-service
spring.cloud.gateway.routes[7].uri=http://localhost:3008
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/promotions/**

# 9. Delivery Service
spring.cloud.gateway.routes[8].id=delivery-service
spring.cloud.gateway.routes[8].uri=http://localhost:3009
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/delivery/**

# 10. Shift Service
#spring.cloud.gateway.routes[9].id=shift-service
#spring.cloud.gateway.routes[9].uri=http://localhost:3010
#spring.cloud.gateway.routes[9].predicates[0]=Path=/api/shifts/**
spring.cloud.gateway.routes[0].id=shift-service
spring.cloud.gateway.routes[0].uri=http://localhost:3010
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/shifts/**
logging.level.org.springframework.cloud.gateway=DEBUG
# 11. Payment Service
spring.cloud.gateway.routes[10].id=payment-service
spring.cloud.gateway.routes[10].uri=http://localhost:3011
spring.cloud.gateway.routes[10].predicates[0]=Path=/api/payments/**